name: A11y tests 
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - name: Run a11y tests
        run: npm run test --reporter=verbose --reporter=junit --outputFile=test-results.xml
 
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
 
      - name: Test summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: test-results.xml
 